name: Build landing page + pack extension zip to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Pack extension zip for release
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('${{ github.workspace }}/extension/manifest.json'))['version'])")
          ZIPNAME="Flyrics-v$VERSION.zip"
          cd "${{ github.workspace }}"
          zip -r "/tmp/$ZIPNAME" extension/ -x "extension/*.pem"
          echo "ZIPNAME=$ZIPNAME" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('${{ github.workspace }}/extension/manifest.json'))['version'])")
          ZIPNAME="Flyrics-v$VERSION.zip"

          # Clean up previous 'latest' release
          gh release view latest --json tagName --jq .tagName 2>/dev/null && \
            gh release delete latest --yes --cleanup-tag 2>/dev/null || true

          gh release create latest \
            --title "Flyrics v$VERSION" \
            --notes "Auto-built from commit ${{ github.sha }}. See [Install instructions](https://flixyudh.github.io/lyricpip/#install)." \
            --target "${{ github.sha }}" \
            "/tmp/$ZIPNAME#$ZIPNAME"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
