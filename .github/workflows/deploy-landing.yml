name: Deploy landing page + pack CRX to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Pack CRX
        working-directory: /tmp
        shell: bash
        run: |
          KEY_FILE=/tmp/key.pem
          if [ -n "${{ secrets.EXTENSION_PEM_KEY }}" ]; then
            echo "${{ secrets.EXTENSION_PEM_KEY }}" > "$KEY_FILE"
          else
            openssl genrsa -out "$KEY_FILE" 2048
            echo "::notice::No EXTENSION_PEM_KEY secret set. Using ephemeral key (extension ID changes per build)."
          fi

          EXT="${{ github.workspace }}/extension"
          OUT="${{ github.workspace }}/landing/dist/extension.crx"
          PACKED=false

          # 1) Chrome + xvfb (most reliable for valid CRX3)
          if command -v xvfb-run &>/dev/null && command -v google-chrome &>/dev/null; then
            echo "Trying google-chrome --pack-extension (xvfb) ..."
            xvfb-run -a google-chrome --pack-extension="$EXT" \
              --pack-extension-key="$KEY_FILE" --no-sandbox --disable-gpu 2>/dev/null || true
            if [ -f "${EXT}.crx" ]; then
              mv "${EXT}.crx" "$OUT"
              rm -f "${EXT}.pem"
              PACKED=true
              echo "CRX packed with Chrome ($(wc -c < "$OUT") bytes)"
            fi
          fi

          # 2) Chrome headless (fallback)
          if [ "$PACKED" = false ] && command -v google-chrome &>/dev/null; then
            echo "Trying google-chrome --pack-extension (headless) ..."
            google-chrome --headless=new --pack-extension="$EXT" \
              --pack-extension-key="$KEY_FILE" --no-sandbox --disable-gpu 2>/dev/null || true
            if [ -f "${EXT}.crx" ]; then
              mv "${EXT}.crx" "$OUT"
              rm -f "${EXT}.pem"
              PACKED=true
              echo "CRX packed with Chrome (headless) ($(wc -c < "$OUT") bytes)"
            fi
          fi

          # 3) npx crx3 (last resort)
          if [ "$PACKED" = false ]; then
            echo "Chrome pack failed. Trying npx crx3 ..."
            npx crx3 "$EXT" -o "$OUT" -p "$KEY_FILE"
            echo "CRX packed with crx3 ($(wc -c < "$OUT") bytes)"
          fi

          rm -f "$KEY_FILE"

      - name: Upload CRX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension.crx
          path: landing/dist/extension.crx
          if-no-files-found: error

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
