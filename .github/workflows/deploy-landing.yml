name: Deploy landing page + pack CRX to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - 'landing/**'
      - '.github/workflows/deploy-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Pack CRX
        run: |
          if [ -n "${{ secrets.EXTENSION_PEM_KEY }}" ]; then
            echo "${{ secrets.EXTENSION_PEM_KEY }}" > /tmp/key.pem
            npx crx3 ../extension/ -o dist/extension.crx -p /tmp/key.pem
            rm -f /tmp/key.pem
          else
            mkdir -p /tmp/crx-key
            openssl genrsa -out /tmp/crx-key/key.pem 2048
            npx crx3 ../extension/ -o dist/extension.crx -p /tmp/crx-key/key.pem
            echo ""
            echo "::notice::No EXTENSION_PEM_KEY secret found. A new signing key was generated."
            echo "::notice::Save the following key as the EXTENSION_PEM_KEY secret for consistent extension IDs:"
            echo ""
            cat /tmp/crx-key/key.pem
            rm -rf /tmp/crx-key
          fi
          echo "CRX size: $(wc -c < dist/extension.crx) bytes"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
